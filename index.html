<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 學習歷程密室</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel for parsing JSX in the browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Custom Animations Fallback -->
  <style>
    .animate-in { animation-duration: 0.8s; animation-fill-mode: both; }
    .fade-in { animation-name: fadeIn; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .zoom-in { animation-name: zoomIn; }
    .zoom-in-95 { animation-name: zoomIn95; }
    @keyframes zoomIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    @keyframes zoomIn95 { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .slide-in-from-top-4 { animation-name: slideInTop; }
    @keyframes slideInTop { from { transform: translateY(-1rem); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .slide-in-from-bottom-4 { animation-name: slideInBottom; }
    .slide-in-from-bottom-5 { animation-name: slideInBottom5; }
    @keyframes slideInBottom { from { transform: translateY(1rem); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes slideInBottom5 { from { transform: translateY(1.25rem); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    
    /* 動畫時間與延遲設定 (用於感性過場畫面) */
    .duration-200 { animation-duration: 0.2s; }
    .duration-300 { animation-duration: 0.3s; }
    .duration-500 { animation-duration: 0.5s; }
    .duration-700 { animation-duration: 0.7s; }
    .duration-1000 { animation-duration: 1s; }
    .duration-2000 { animation-duration: 2s; }
    .delay-1000 { animation-delay: 1s; }
    .delay-2500 { animation-delay: 2.5s; }
    .delay-4000 { animation-delay: 4s; }
    .delay-6000 { animation-delay: 6s; }
    .delay-7500 { animation-delay: 7.5s; }
  </style>
</head>
<body class="bg-slate-950 text-white m-0 p-0 overflow-x-hidden">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- 場景靜態圖片網址設定區 (移至全域，防止重新渲染閃爍) ---
    const staticRoomImages = {
      cover: "assets/cover.png",
      main: "assets/main-hall.png",
      archive: "assets/archive.png",
      locker: "assets/locker.png",
      system: "assets/system-room.png",
      desk: "assets/desk.png",
      prepRoom: "assets/prep-room.avif",
      puzzleBoard: "assets/system-room.png", 
      finalBoss: "assets/final-boss.png"
    };

    // --- 共用的場景靜態圖片渲染元件 ---
    const RoomImageDisplay = ({ roomId }) => {
      const imgUrl = staticRoomImages[roomId];
      if (!imgUrl) return null;

      return (
        <div className="mb-8 bg-black/40 border border-white/10 rounded-2xl p-5 shadow-lg">
          <div className="flex items-center gap-2 text-cyan-300 font-bold mb-4">
            <span className="text-xl">📸</span> 
            <h3>現場畫面紀錄</h3>
          </div>
          <div className="animate-in slide-in-from-top-4">
            <img src={imgUrl} className="w-full rounded-xl shadow-2xl max-h-[400px] object-cover border border-white/20" alt="Room Scene" />
          </div>
        </div>
      );
    };

    function App() {
      // --- 遊戲全域狀態 ---
      const [scene, setScene] = useState("cover"); 
      const sceneRef = useRef(scene);
      const [timeLeft, setTimeLeft] = useState(1200); 
      const [inventory, setInventory] = useState([]); 
      const [inspectingItem, setInspectingItem] = useState(null); 
      const [showHintModal, setShowHintModal] = useState(false); 
      const [playerName, setPlayerName] = useState(""); 
      const [quoteIndex, setQuoteIndex] = useState(0); 
      
      // 同步 scene 到 useRef
      useEffect(() => {
        sceneRef.current = scene;
      }, [scene]);

      // --- 100 分總分系統與提示解鎖狀態 ---
      const [score, setScore] = useState(100);
      const [unlockedHints, setUnlockedHints] = useState({});

      // --- 音效系統 (Web Audio API 滴答聲) ---
      const audioCtxRef = useRef(null);
      const isMutedRef = useRef(false);
      const [isMuted, setIsMuted] = useState(false);

      useEffect(() => {
        isMutedRef.current = isMuted;
      }, [isMuted]);

      const initAudio = () => {
        if (!audioCtxRef.current) {
          audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtxRef.current.state === 'suspended') {
          audioCtxRef.current.resume();
        }
      };

      const playTick = (isFast) => {
        if (!audioCtxRef.current || isMutedRef.current) return;
        try {
          const ctx = audioCtxRef.current;
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();

          osc.connect(gain);
          gain.connect(ctx.destination);

          osc.type = 'square';
          osc.frequency.setValueAtTime(isFast ? 800 : 400, ctx.currentTime);

          gain.gain.setValueAtTime(0, ctx.currentTime);
          gain.gain.linearRampToValueAtTime(0.05, ctx.currentTime + 0.01);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);

          osc.start(ctx.currentTime);
          osc.stop(ctx.currentTime + 0.1);
        } catch (e) {}
      };

      const handleStartGame = () => {
        if (playerName.trim()) {
          setScene("main");
          initAudio();
        } else {
          showToast("請輸入特務代號！");
        }
      };

      const toggleMute = () => {
        setIsMuted(!isMuted);
      };

      // 道具詳細資料 
      const itemDetails = {
        pin: {
          id: "pin",
          icon: "📝",
          name: "交叉比對報告",
          desc: "紀錄著 AI 退件邏輯的分析報告，上面解開的密碼為 7319。",
          clue: "🔍 仔細看，報告背後有一個用螢光筆寫的字根：【 十 】"
        },
        filter: {
          id: "filter",
          icon: "🟥",
          name: "紅色濾色片",
          desc: "半透明的紅色塑膠板，可以過濾掉紅色的光線。",
          clue: "普通的濾色片，似乎可以用在某個充滿紅色雜訊的場景。"
        },
        evidence: {
          id: "evidence",
          icon: "💾",
          name: "隨身碟：【證據】",
          desc: "儲存著學生真實經歷佐證資料的隨身碟。",
          clue: "🔍 隨身碟金屬接頭的背面，刻著一個字根：【具 】"
        },
        growth: {
          id: "growth",
          icon: "🌱",
          name: "核心代碼：【成長】",
          desc: "修復 AI 演算法後取得的核心概念代碼。",
          clue: "🔍 代碼的最後一行，閃爍著一個字根：【宀  】"
        },
        reflection: {
          id: "reflection",
          icon: "🔏",
          name: "教授印章：【反思】",
          desc: "教授用來核可優秀學習歷程的專用印章。",
          clue: "🔍 印章木柄的底部，刻著一個字根：【 毋 】"
        },
        motivation: {
          id: "motivation",
          icon: "🧭",
          name: "導航羅盤：【動機】",
          desc: "指引出行動背後最純粹的熱情與初衷。",
          clue: "🔍 羅盤的背面，刻著一個字根：【 貝 】"
        }
      };

      // --- 各房間獨立狀態 ---
      const [archiveMatches, setArchiveMatches] = useState({ A: "", B: "", C: "", D: "" });
      const [archiveSolved, setArchiveSolved] = useState(false);
      
      const initialSudoku = [[1, 0, 0], [0, 2, 1], [2, 0, 3]];
      const targetSudoku = [[1, 3, 2], [3, 2, 1], [2, 1, 3]];
      const [sudokuGrid, setSudokuGrid] = useState(initialSudoku);
      const [lockerUnlocked, setLockerUnlocked] = useState(false);
      
      const [systemPin, setSystemPin] = useState("");
      const [systemUnlocked, setSystemUnlocked] = useState(false);
      const [systemDecoded, setSystemDecoded] = useState(false);
      const [systemCrypto, setSystemCrypto] = useState("");
      
      const [filterActive, setFilterActive] = useState(false);
      const [deskSolved, setDeskSolved] = useState(false);

      const initialPuzzle = [4, 1, 8, 2, 7, 0, 5, 3, 6];
      const [puzzlePieces, setPuzzlePieces] = useState(initialPuzzle);
      const [selectedPuzzleIdx, setSelectedPuzzleIdx] = useState(null);
      const isPuzzleSolved = puzzlePieces.every((val, i) => val === i);
      const [prepCode, setPrepCode] = useState("");
      const [prepSolved, setPrepSolved] = useState(false);
      const puzzleLabels = ["不", "盲", "目", "跟", "從", "找", "回", "熱", "忱"];

      const [finalSlots, setFinalSlots] = useState({ s1: "", s2: "", s3: "", s4: "" });
      const [finalRiddleAnswer, setFinalRiddleAnswer] = useState("");

      const [toastMsg, setToastMsg] = useState("");
      useEffect(() => {
        if (toastMsg) {
          const timer = setTimeout(() => setToastMsg(""), 3500);
          return () => clearTimeout(timer);
        }
      }, [toastMsg]);
      const showToast = (msg) => setToastMsg(msg);

      const quotes = [
        "「學習不是為了向誰證明，而是為了看見自己成長的軌跡。」",
        "「每一次反思，都是為了下一次躍進積蓄能量。」",
        "「真實的經歷不需要華麗的包裝，證據會為你說話。」",
        "「成長的價值，隱藏在從『不會』到『會』的汗水裡。」",
        "「最好的學習歷程，就是你真誠面對自己改變的故事。」"
      ];

      // --- 倒數計時器 (獨立執行) ---
      useEffect(() => {
        const timer = setInterval(() => {
          const currentScene = sceneRef.current;
          if (currentScene === "cover" || currentScene === "start" || currentScene === "epilogue" || currentScene === "clear" || currentScene === "gameover") return;
          
          setTimeLeft((prev) => {
            if (prev <= 1) {
              setScene("gameover");
              return 0;
            }
            return prev - 1;
          });
        }, 1000);
        return () => clearInterval(timer);
      }, []);

      // --- 根據 timeLeft 播放滴答聲 ---
      useEffect(() => {
        const currentScene = sceneRef.current;
        if (currentScene === "cover" || currentScene === "start" || currentScene === "epilogue" || currentScene === "clear" || currentScene === "gameover") return;
        if (timeLeft <= 0) return;

        const isFast = timeLeft <= 300; 
        playTick(isFast);
        
        let timeoutId;
        if (isFast) {
          timeoutId = setTimeout(() => {
            const latestScene = sceneRef.current;
            if (latestScene !== "clear" && latestScene !== "gameover" && latestScene !== "epilogue") {
              playTick(isFast);
            }
          }, 500);
        }
        return () => clearTimeout(timeoutId);
      }, [timeLeft]);

      const addToInventory = (itemId) => {
        setInventory((prev) => {
          if (!prev.includes(itemId)) return [...prev, itemId];
          return prev;
        });
      };

      // --- 提示與解答資料庫 ---
      const hintData = {
        main: {
          hint: "大廳有 5 個區域可以搜查。解開所有謎題取得 4 個核心模組與密碼報告後，才能解鎖下方的終極防火牆喔！",
          solution: "分別完成檔案櫃、置物櫃、審查系統、辦公桌、面試室。防火牆解答依序為：【動機】、【證據】、【成長】、【反思】。"
        },
        archive: {
          hint: "仔細對照左側的退件守則！檔案A只有獎狀；檔案B沒附截圖；檔案C心得太表面；檔案D文不對題。",
          solution: "由上而下選擇代碼：7、3、1、9，再點擊提交。"
        },
        locker: {
          hint: "這是一個數獨謎題，每一行、每一列數字 1、2、3 都只能出現一次且不能重複。",
          solution: "第一排: 1、3、2；第二排: 3、2、1；第三排: 2、1、3。"
        },
        system: {
          hint: "PIN 碼在「退件檔案櫃」拿到的交叉比對報告背後。圖形解碼是植物從小到大的改變過程。",
          solution: "密碼輸入 7319；解譯文字輸入「成長」。"
        },
        desk: {
          hint: "需要能過濾紅光的道具，先去「學生置物櫃」解開數獨找找看！",
          solution: "在置物櫃拿到「紅色濾色片」後，點擊裝備，接著點擊提取線索。"
        },
        prepRoom: {
          hint: "點擊相鄰碎片交換位置，拼成一張完整的電路板背景，並讀出上面的句子。",
          solution: "拼出完整的圖後，下方文字框請輸入「熱忱」。"
        },
        finalBoss: {
          hint: "打開下方道具欄，檢視每一個道具。把它們上面隱藏的字根：【十】【具】【宀】【毋】【貝】組合起來。",
          solution: "組合後的答案為「真實」。"
        }
      };

      const handleUnlockFeature = (type, cost) => {
        if (score >= cost) {
          setScore(s => s - cost);
          setUnlockedHints(prev => ({
            ...prev,
            [scene]: { ...(prev[scene] || {}), [type]: true }
          }));
          showToast(`已扣除 ${cost} 分，成功開啟${type === 'hint' ? '提示' : '解答'}！`);
        } else {
          showToast("⚠️ 特務積分不足，無法開啟此功能！");
        }
      };

      const renderHintModalContent = () => {
        const currentData = hintData[scene] || { hint: "此區域目前無可用提示。", solution: "此區域無直接解答。" };
        const currentUnlocked = unlockedHints[scene] || { hint: false, solution: false };

        if (!hintData[scene]) {
          return <p className="text-slate-400">目前不在可探索的房間內，請進入房間後再呼叫 AI 提示。</p>;
        }

        return (
          <div className="space-y-4">
            <p className="text-slate-300 text-sm mb-2">使用特務積分兌換情報，分數越高代表你越能獨立解決問題！</p>
            
            {/* 提示區塊 */}
            <div className="bg-slate-800 p-4 rounded-xl border border-slate-600 shadow-inner">
              <div className="flex justify-between items-center mb-3 border-b border-slate-700 pb-2">
                <h4 className="text-yellow-400 font-bold flex items-center gap-2">💡 輕度提示</h4>
                {!currentUnlocked.hint ? (
                  <button 
                    onClick={() => handleUnlockFeature('hint', 10)} 
                    className="px-3 py-1 bg-yellow-600 hover:bg-yellow-500 text-xs font-bold rounded text-white transition-colors"
                  >
                    -10 分 解鎖
                  </button>
                ) : (
                  <span className="text-xs text-green-400 font-bold">已解鎖</span>
                )}
              </div>
              {currentUnlocked.hint ? (
                <p className="text-slate-200 text-sm leading-relaxed">{currentData.hint}</p>
              ) : (
                <p className="text-slate-500 text-sm italic">情報已加密，需要花費積分開啟。</p>
              )}
            </div>

            {/* 解答區塊 */}
            <div className="bg-slate-800 p-4 rounded-xl border border-slate-600 shadow-inner">
              <div className="flex justify-between items-center mb-3 border-b border-slate-700 pb-2">
                <h4 className="text-red-400 font-bold flex items-center gap-2">🔑 直接看解答</h4>
                {!currentUnlocked.solution ? (
                  <button 
                    onClick={() => handleUnlockFeature('solution', 30)} 
                    className="px-3 py-1 bg-red-600 hover:bg-red-500 text-xs font-bold rounded text-white transition-colors"
                  >
                    -30 分 解鎖
                  </button>
                ) : (
                  <span className="text-xs text-green-400 font-bold">已解鎖</span>
                )}
              </div>
              {currentUnlocked.solution ? (
                <p className="text-white text-sm font-bold bg-red-950/50 p-3 rounded leading-relaxed border border-red-900/50">{currentData.solution}</p>
              ) : (
                <p className="text-slate-500 text-sm italic">情報已加密，需要花費積分開啟。</p>
              )}
            </div>
          </div>
        );
      };

      const renderInventoryBar = () => (
        <div className="sticky bottom-4 z-40 bg-slate-900/95 backdrop-blur-md border border-cyan-900/50 rounded-2xl p-4 md:p-5 mt-8 flex flex-col md:flex-row gap-4 items-start md:items-center shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
          <div className="shrink-0 flex items-center gap-2">
            <span className="text-2xl">🎒</span>
            <div>
              <h3 className="text-sm font-bold text-slate-300">特務道具欄</h3>
              <div className="text-xs text-cyan-400 font-mono">收集進度: {inventory.length}/6</div>
            </div>
          </div>
          <div className="flex flex-wrap gap-2 flex-1">
            {inventory.length === 0 && <span className="text-slate-500 italic text-sm mt-1">目前尚未取得任何線索道具...</span>}
            {inventory.map(id => (
              <button
                key={id}
                onClick={() => setInspectingItem(id)}
                className="bg-slate-800 border border-slate-600 hover:bg-slate-700 hover:border-cyan-400 px-3 py-2 rounded-xl text-sm text-slate-200 shadow-sm transition-all cursor-pointer flex items-center gap-2"
              >
                <span className="text-lg">{itemDetails[id].icon}</span>
                <span className="font-bold">{itemDetails[id].name}</span>
              </button>
            ))}
          </div>
        </div>
      );

      // --- 房間渲染區 ---

      const renderArchive = () => (
        <div className="animate-in fade-in zoom-in-95 duration-300">
          <div className="bg-stone-800 border-2 border-stone-600 rounded-2xl p-6 md:p-8 shadow-2xl">
            <h2 className="text-3xl font-black mb-6 text-stone-200">🗂️ 退件檔案櫃</h2>
            <RoomImageDisplay roomId="archive" />
            <p className="text-stone-400 mb-6">請詳閱左側的「AI 判定守則」，並為右側的 4 份缺陷檔案標上正確的退件代碼。</p>
            
            {!archiveSolved ? (
              <div className="flex flex-col lg:flex-row gap-6">
                <div className="flex-1 bg-stone-200 text-stone-900 p-6 rounded-xl border border-stone-400 font-serif shadow-inner">
                  <h3 className="font-bold text-xl mb-4 border-b-2 border-stone-400 pb-2">📋 AI 退件判定守則</h3>
                  <ul className="space-y-4 text-sm leading-relaxed">
                    <li><span className="bg-red-200 font-bold px-2 py-1 rounded">代碼 1：有心得，無成長</span><br/>(僅流於表面感觸，無法看見具體改變)</li>
                    <li><span className="bg-orange-200 font-bold px-2 py-1 rounded">代碼 3：有過程，無佐證</span><br/>(敘述了大量過程，卻沒有提出任何客觀證據)</li>
                    <li><span className="bg-yellow-200 font-bold px-2 py-1 rounded">代碼 7：有成果，無動機</span><br/>(只放上厲害的結果，卻看不出為什麼要做)</li>
                    <li><span className="bg-blue-200 font-bold px-2 py-1 rounded">代碼 9：經歷與目標不符</span><br/>(事件本身沒問題，但與申請目標毫無關聯)</li>
                  </ul>
                </div>
                <div className="flex-1 space-y-4">
                  {[
                    { id: "A", title: "檔案 A", content: "『附上一張全國演講比賽冠軍獎狀。』" },
                    { id: "B", title: "檔案 B", content: "『我每天練習寫程式一千行！』(無附截圖)" },
                    { id: "C", title: "檔案 C", content: "『擔任社長學到了溝通能力，這對未來很有幫助。』" },
                    { id: "D", title: "檔案 D", content: "『參加醫學營學會解剖。』(附件：申請【中文系】)" }
                  ].map((file) => (
                    <div key={file.id} className="bg-stone-700 border border-stone-500 p-4 rounded-xl flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                      <div className="text-stone-200 text-sm flex-1">
                        <span className="font-bold text-stone-100">{file.title}：</span>{file.content}
                      </div>
                      <select
                        value={archiveMatches[file.id]}
                        onChange={(e) => setArchiveMatches({...archiveMatches, [file.id]: e.target.value})}
                        className="bg-stone-900 border border-stone-500 text-white px-3 py-2 rounded outline-none w-full sm:w-32"
                      >
                        <option value="">選擇代碼</option>
                        <option value="1">代碼 1</option>
                        <option value="3">代碼 3</option>
                        <option value="7">代碼 7</option>
                        <option value="9">代碼 9</option>
                      </select>
                    </div>
                  ))}
                  <button 
                    onClick={() => {
                      if (archiveMatches.A === "7" && archiveMatches.B === "3" && archiveMatches.C === "1" && archiveMatches.D === "9") {
                        setArchiveSolved(true);
                        addToInventory("pin");
                        showToast("比對完全正確！隱藏的線索已掉落。");
                      } else {

                      <div className="flex items-center gap-3 flex-wrap">
                        <span className="text-cyan-300">System.inject(</span>
                        <select value={finalSlots.s1} onChange={e => setFinalSlots({...finalSlots, s1: e.target.value})} className="bg-slate-900 border border-cyan-500 text-cyan-200 px-3 py-1.5 rounded outline-none cursor-pointer">
                          {firewallOptions}
                        </select>
                        <span className="text-cyan-300">);</span>
                      </div>
                    </div>

                    {/* 錯誤 1 */}
                    <div className="border-l-4 border-red-500 pl-4 py-1">
                      <div className="text-slate-500 mb-1">// Exception 0x01: Data_Verification_Failed</div>
                      <div className="text-red-400 mb-3">Error: 缺乏客觀事實佐證，判定為過度包裝或憑空捏造。</div>
                      <div className="flex items-center gap-3 flex-wrap">
                        <span className="text-cyan-300">System.inject(</span>
                        <select value={finalSlots.s2} onChange={e => setFinalSlots({...finalSlots, s2: e.target.value})} className="bg-slate-900 border border-cyan-500 text-cyan-200 px-3 py-1.5 rounded outline-none cursor-pointer">
                          {firewallOptions}
                        </select>
                        <span className="text-cyan-300">);</span>
                      </div>
                    </div>

                    {/* 錯誤 2 */}
                    <div className="border-l-4 border-red-500 pl-4 py-1">
                      <div className="text-slate-500 mb-1">// Exception 0x02: Timeline_Discontinuity</div>
                      <div className="text-red-400 mb-3">Error: 僅有單一時間點的切片，無法觀測到能力的變化與發展曲線。</div>
                      <div className="flex items-center gap-3 flex-wrap">
                        <span className="text-cyan-300">System.inject(</span>
                        <select value={finalSlots.s3} onChange={e => setFinalSlots({...finalSlots, s3: e.target.value})} className="bg-slate-900 border border-cyan-500 text-cyan-200 px-3 py-1.5 rounded outline-none cursor-pointer">
                          {firewallOptions}
                        </select>
                        <span className="text-cyan-300">);</span>
                      </div>
                    </div>

                    {/* 錯誤 3 */}
                    <div className="border-l-4 border-red-500 pl-4 py-1">
                      <div className="text-slate-500 mb-1">// Exception 0x03: Value_Extraction_Error</div>
                      <div className="text-red-400 mb-3">Error: 僅停留在『學到很多』的表層感觸，未能萃取出可轉移的核心價值。</div>
                      <div className="flex items-center gap-3 flex-wrap">
                        <span className="text-cyan-300">System.inject(</span>
                        <select value={finalSlots.s4} onChange={e => setFinalSlots({...finalSlots, s4: e.target.value})} className="bg-slate-900 border border-cyan-500 text-cyan-200 px-3 py-1.5 rounded outline-none cursor-pointer">
                          {firewallOptions}
                        </select>
                        <span className="text-cyan-300">);</span>
                      </div>
                    </div>
                  </div>

                  <button 
                    onClick={() => {
                      if (finalSlots.s1 === "motivation" && finalSlots.s2 === "evidence" && finalSlots.s3 === "growth" && finalSlots.s4 === "reflection") {
                        setScene("finalBoss");
                      } else {
                        showToast("邏輯迴圈錯誤！系統排斥了你放入的模組組合。請重新思考它們對應的問題。");
                      }
                    }}
                    className="w-full md:w-auto px-10 py-4 bg-cyan-500 hover:bg-cyan-400 text-black font-black text-xl rounded-xl transition-all shadow-[0_0_20px_rgba(6,182,212,0.4)]"
                  >
                    執行系統覆寫
                  </button>
                </div>
              )}
            </div>
          </div>
        );
      };

      const renderFinalBoss = () => (
        <div className="animate-in zoom-in duration-500">
          <div className="bg-indigo-950/40 border-2 border-indigo-500 rounded-[2rem] p-8 md:p-12 shadow-[0_0_40px_rgba(99,102,241,0.3)] mt-8">
            <div className="flex items-center gap-4 mb-6">
              <span className="text-5xl animate-pulse">🧩</span>
              <h2 className="text-3xl md:text-4xl font-black text-indigo-400 tracking-wider">終極防禦：字根重組協定</h2>
            </div>

            <RoomImageDisplay roomId="finalBoss" />
            
            <p className="text-indigo-200 text-lg mb-6 leading-relaxed">
              警告！系統偵測到異常的邏輯覆寫，啟動了最後的觀察力測試。<br/>
              前五個關卡中，AI 在各處留下了一個<span className="text-yellow-400 font-bold px-1">隱藏的中文字根</span>。<br/>
              你可以隨時<span className="text-cyan-300 font-bold">點擊下方道具欄</span>來重溫你找到的 <span className="font-bold text-white">5 個線索</span>。<br/>
              請觀察這 5 個字根，將它們拼湊組合，形成一個代表『學習歷程終極精神』的雙字詞彙。
            </p>

            <div className="bg-black/50 p-6 rounded-2xl border border-indigo-500/50 mb-8">
              <div className="flex flex-col md:flex-row gap-4">
                <input
                  value={finalRiddleAnswer}
                  onChange={(e) => setFinalRiddleAnswer(e.target.value)}
                  placeholder="請輸入組合後的兩個中文字..."
                  className="flex-1 bg-black border border-indigo-500/50 text-white px-5 py-3 rounded-xl outline-none focus:border-indigo-400 text-lg"
                />
                <button
                  onClick={() => {
                    if (finalRiddleAnswer.trim() === "真實") {
                      setQuoteIndex(Math.floor(Math.random() * quotes.length));
                      setScene("epilogue"); 
                    } else {
                      showToast("❌ 字謎錯誤！提示：仔細看道具欄裡的 5 個字根【十】【具】【宀】【貝】【毋】，把它們組合起來！");
                    }
                  }}
                  className="px-8 py-3 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-xl transition-all whitespace-nowrap flex items-center justify-center min-w-[160px]"
                >
                  ✨ 驗證並通關
                </button>
              </div>
            </div>
          </div>
          <div className="mt-8 flex justify-center">
            <button onClick={() => setScene("main")} className="px-8 py-3 bg-slate-800 hover:bg-slate-700 border border-slate-600 text-cyan-400 font-bold rounded-full transition-all shadow-lg">
              ← 暫時返回大廳
            </button>
          </div>
        </div>
      );

      const renderEpilogue = () => (
        <div className="animate-in fade-in duration-1000 min-h-[70vh] flex flex-col items-center justify-center text-center px-4 relative z-20">
          <div className="max-w-3xl space-y-10">
            <div className="text-5xl animate-pulse mb-8 drop-shadow-[0_0_15px_rgba(255,255,255,0.8)]">✨</div>
            
            <p className="text-2xl md:text-3xl text-cyan-200 leading-relaxed font-light opacity-0 animate-[fadeIn_2s_ease-in-out_forwards] fill-both">
              隨著「真實」兩字輸入，刺眼的紅光逐漸消散。
            </p>
            
            <p className="text-2xl md:text-3xl text-slate-300 leading-relaxed font-light opacity-0 animate-[fadeIn_2s_ease-in-out_forwards] fill-both delay-2500">
              AI 系統停止了盲目的數據比對，開始用心讀取你留下的每一個痕跡。
            </p>
            
            <p className="text-3xl md:text-4xl text-yellow-400 font-bold leading-relaxed opacity-0 animate-[fadeIn_2s_ease-in-out_forwards] fill-both delay-4000">
              它最終確認的，不是你擁有多少華麗的獎狀...
            </p>
            
            <div className="opacity-0 animate-[fadeIn_2s_ease-in-out_forwards] fill-both delay-6000 pt-8">
              <p className="text-4xl md:text-5xl text-white font-black leading-tight border-b-4 border-cyan-500 pb-6 inline-block tracking-wide drop-shadow-lg">
                而是你真誠面對挫折、反思成長，<br className="hidden md:block"/><br className="md:hidden"/>
                所展現出那份「<span className="text-cyan-400 mx-2">真實且一致</span>」的力量。
              </p>
            </div>
            
            <div className="opacity-0 animate-[fadeIn_1s_ease-in-out_forwards] fill-both delay-7500 pt-16">
              <button 
                onClick={() => setScene("clear")}
                className="px-12 py-5 bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 text-white font-black rounded-full transition-all shadow-[0_0_40px_rgba(6,182,212,0.6)] hover:scale-105 text-xl tracking-widest border border-cyan-300"
              >
                領取專屬破關憑證 ➔
              </button>
            </div>
          </div>
        </div>
      );

      const renderCoverScreen = () => (
        <div
          className="min-h-screen relative overflow-hidden bg-slate-950"
          tabIndex="0"
          onKeyDown={(e) => {
            if (e.key === 'Enter') setScene("start");
          }}
        >
          <img
            src={staticRoomImages.cover}
            alt="AI 學習歷程密室遊戲封面"
            className="absolute inset-0 w-full h-full object-cover"
          />
          <div className="absolute inset-0 bg-gradient-to-t from-slate-950 via-slate-950/20 to-slate-950/10"></div>
          <div className="relative z-10 min-h-screen flex items-end justify-center px-5 pb-10 md:pb-14">
            <button
              onClick={() => setScene("start")}
              className="w-full max-w-sm px-8 py-4 bg-cyan-500/90 hover:bg-cyan-300 text-slate-950 font-black text-xl rounded-xl border border-cyan-100 shadow-[0_0_35px_rgba(34,211,238,0.7)] transition-all hover:scale-[1.03] active:scale-[0.99]"
            >
              開始任務
            </button>
          </div>
        </div>
      );

      const renderStartScreen = () => (
        <div 
          className="flex flex-col items-center justify-center min-h-screen relative overflow-hidden"
          style={{
            backgroundImage: `url('${staticRoomImages.cover}')`,
            backgroundSize: 'cover',
            backgroundPosition: 'center',
          }}
        >
          <div className="absolute inset-0 bg-slate-950/70 backdrop-blur-sm z-0"></div>

          <div className="max-w-xl w-full mx-4 bg-slate-900/50 border border-cyan-500/50 rounded-[2rem] p-8 md:p-12 text-center shadow-[0_0_50px_rgba(6,182,212,0.2)] animate-in fade-in zoom-in duration-700 backdrop-blur-md relative z-10">
            <div className="text-7xl mb-6 drop-shadow-[0_0_20px_rgba(34,211,238,0.8)] animate-pulse">🕵️</div>
            <h1 className="text-4xl md:text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 mb-4 tracking-tight drop-shadow-lg">
              AI 學習歷程密室
            </h1>
            <p className="text-slate-300 text-lg md:text-xl mb-6 leading-relaxed font-medium text-justify md:text-center">
              近期，AI 審查系統發生異常，大量學生的學習歷程檔案遭到無端退件。<br/>
              身為頂尖除錯特務，你必須潛入系統核心，協助 Debug 找出評分邏輯的致命盲點。
            </p>
            <p className="text-cyan-400 text-lg md:text-xl mb-8 leading-relaxed font-bold animate-pulse">
              警告：系統將在 20 分鐘後強制鎖死。
            </p>
            <input
              type="text"
              value={playerName}
              onChange={(e) => setPlayerName(e.target.value)}
              placeholder="輸入特務代號 / 玩家名稱"
              className="w-full bg-black/60 border border-cyan-500/50 text-white px-6 py-4 rounded-xl outline-none focus:border-cyan-300 focus:ring-1 focus:ring-cyan-300 text-xl text-center mb-6 shadow-inner transition-all placeholder:text-slate-500"
              onKeyDown={(e) => {
                if (e.key === 'Enter') handleStartGame();
              }}
            />
            <button
              onClick={handleStartGame}
              className="w-full px-8 py-4 bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 border border-cyan-400 text-white font-black text-xl rounded-xl transition-all shadow-[0_0_20px_rgba(6,182,212,0.5)] hover:scale-105"
            >
              🚀 啟動潛入任務
            </button>
          </div>
        </div>
      );

      return (
        <React.Fragment>
          {scene !== "cover" && scene !== "start" && scene !== "epilogue" && scene !== "clear" && scene !== "gameover" && (
            <div className="fixed top-4 right-4 z-[150] flex flex-col gap-3">
              <button 
                onClick={toggleMute} 
                className="bg-slate-900/80 border border-cyan-500/50 text-cyan-400 p-3 rounded-full hover:bg-slate-800 transition-all shadow-[0_0_15px_rgba(6,182,212,0.3)] backdrop-blur-md flex items-center justify-center w-12 h-12"
                title={isMuted ? "播放音樂" : "靜音"}
              >
                <span className="text-xl leading-none">{isMuted ? "🔇" : "🔊"}</span>
              </button>
              <button 
                onClick={() => setShowHintModal(true)} 
                className="bg-yellow-600/80 border border-yellow-400/50 text-yellow-200 p-3 rounded-full hover:bg-yellow-500 hover:text-white transition-all shadow-[0_0_15px_rgba(202,138,4,0.3)] backdrop-blur-md flex items-center justify-center w-12 h-12"
                title="需要情報嗎？"
              >
                <span className="text-xl leading-none">💡</span>
              </button>
            </div>
          )}

          {scene === "cover" ? (
            renderCoverScreen()
          ) : scene === "start" ? (
            renderStartScreen()
          ) : (
            <div className="min-h-screen max-w-full bg-slate-950 text-white p-4 md:p-8 font-sans selection:bg-cyan-500/30 relative">
              <div className="max-w-5xl mx-auto relative z-10">
                
                {(scene !== "cover" && scene !== "clear" && scene !== "gameover" && scene !== "epilogue") && (
                  <div className="flex flex-col md:flex-row md:justify-between gap-6 mb-6 border-b border-white/10 pb-6">
                    <div>
                      <h1 className="text-4xl md:text-5xl font-black text-cyan-400 mb-2">
                        AI 學習歷程密室
                      </h1>
                      <p className="text-slate-400 text-sm md:text-base">搜查場景、尋找密碼、運用實體道具解開 AI 的評分邏輯。</p>
                    </div>
                    <div className="flex gap-4">
                      <div className="bg-yellow-950/50 border border-yellow-500/30 rounded-xl px-4 py-2 text-center shrink-0 flex flex-col justify-center min-w-[100px]">
                        <div className="text-yellow-300 text-xs font-bold mb-1">特務積分</div>
                        <div className="text-2xl font-black text-yellow-400 font-mono">{score}</div>
                      </div>
                      <div className="bg-red-950/50 border border-red-500/30 rounded-xl px-4 py-2 text-center shrink-0 flex flex-col justify-center min-w-[100px]">
                        <div className="text-red-300 text-xs font-bold mb-1">剩餘時間</div>
                        <div className="text-2xl font-black text-red-400 font-mono">
                          {Math.floor(timeLeft / 60)}:{String(timeLeft % 60).padStart(2, "0")}
                        </div>
                      </div>
                    </div>
                  </div>
                )}

                {scene === "main" && renderMainHall()}
                {scene === "archive" && renderArchive()}
                {scene === "locker" && renderLocker()}
                {scene === "system" && renderSystem()}
                {scene === "desk" && renderDesk()}
                {scene === "prepRoom" && renderPrepRoom()}
                {scene === "finalBoss" && renderFinalBoss()}
                {scene === "epilogue" && renderEpilogue()}

                {(scene !== "cover" && scene !== "start" && scene !== "clear" && scene !== "gameover" && scene !== "epilogue") && renderInventoryBar()}

                {inspectingItem && (
                  <div 
                    className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm animate-in fade-in duration-200" 
                    onClick={() => setInspectingItem(null)}
                  >
                    <div 
                      className="bg-slate-900 border border-slate-700 rounded-2xl p-6 md:p-8 max-w-sm w-full shadow-[0_0_40px_rgba(0,0,0,0.5)] relative" 
                      onClick={e => e.stopPropagation()}
                    >
                      <button
                        onClick={() => setInspectingItem(null)}
                        className="absolute top-4 right-4 text-slate-400 hover:text-white bg-slate-800 hover:bg-slate-700 rounded-full w-8 h-8 flex items-center justify-center transition-colors font-bold"
                      >
                        ✕
                      </button>
                      <div className="text-6xl text-center mb-4">{itemDetails[inspectingItem].icon}</div>
                      <h3 className="text-2xl font-black text-white mb-2 text-center">{itemDetails[inspectingItem].name}</h3>
                      <div className="w-12 h-1 bg-cyan-500 mx-auto mb-4 rounded-full"></div>
                      <p className="text-slate-300 mb-6 leading-relaxed text-center">{itemDetails[inspectingItem].desc}</p>
                      <div className="bg-slate-950 border border-cyan-900/50 p-4 rounded-xl text-cyan-200 text-sm font-bold leading-relaxed shadow-inner">
                        {itemDetails[inspectingItem].clue}
                      </div>
                    </div>
                  </div>
                )}

                {showHintModal && (
                  <div 
                    className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm animate-in fade-in duration-200" 
                    onClick={() => setShowHintModal(false)}
                  >
                    <div 
                      className="bg-slate-900 border-2 border-yellow-500/50 rounded-2xl p-6 md:p-8 max-w-md w-full shadow-[0_0_40px_rgba(202,138,4,0.3)] relative" 
                      onClick={e => e.stopPropagation()}
                    >
                      <button
                        onClick={() => setShowHintModal(false)}
                        className="absolute top-4 right-4 text-slate-400 hover:text-white bg-slate-800 hover:bg-slate-700 rounded-full w-8 h-8 flex items-center justify-center transition-colors font-bold"
                      >
                        ✕
                      </button>
                      <div className="flex items-center gap-3 mb-4 border-b border-yellow-500/30 pb-4">
                        <span className="text-4xl">💡</span>
                        <h3 className="text-2xl font-black text-yellow-400">特務情報交易</h3>
                      </div>
                      
                      {renderHintModalContent()}

                      <div className="mt-6 flex justify-end">
                        <button 
                          onClick={() => setShowHintModal(false)}
                          className="px-6 py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold rounded-xl transition-all w-full md:w-auto"
                        >
                          關閉面板
                        </button>
                      </div>
                    </div>
                  </div>
                )}

                {scene === "clear" && (
                  <div className="animate-in zoom-in duration-700 bg-slate-900 border-4 border-yellow-500/80 rounded-[2rem] p-8 md:p-16 text-white text-center shadow-[0_0_60px_rgba(234,179,8,0.3)] mt-10 relative overflow-hidden">
                    <div className="absolute top-0 left-0 w-full h-full bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-yellow-900/20 via-slate-900/0 to-slate-900/0 pointer-events-none"></div>
                    <div className="text-8xl mb-6 drop-shadow-xl relative z-10">🏆</div>
                    <h2 className="text-4xl md:text-5xl font-black mb-2 text-yellow-400 tracking-widest relative z-10">破關證書</h2>
                    <div className="w-24 h-1 bg-yellow-500 mx-auto mb-6 relative z-10"></div>
                    
                    <p className="text-xl md:text-2xl text-slate-300 mb-2 relative z-10">
                      特務 <span className="text-cyan-400 font-bold border-b-2 border-cyan-400">{playerName}</span>
                    </p>
                    <p className="text-xl md:text-2xl text-yellow-300 font-bold mb-6 relative z-10 drop-shadow">
                      最終特務積分：{score} / 100
                    </p>

                    <p className="text-lg text-slate-400 mb-10 relative z-10">
                      成功於 <span className="text-white font-bold">{Math.floor((1200 - timeLeft) / 60)} 分 {(1200 - timeLeft) % 60} 秒</span> 內覆寫 AI 審查系統，<br/>找回了真實學習歷程的核心價值。
                    </p>

                    <div className="bg-black/50 border border-yellow-600/50 p-6 md:p-8 rounded-2xl mb-10 relative z-10 max-w-2xl mx-auto shadow-inner">
                      <p className="text-2xl font-bold text-yellow-200 leading-relaxed font-serif">
                        {quotes[quoteIndex]}
                      </p>
                    </div>

                    <button onClick={() => window.location.reload()} className="px-10 py-4 bg-yellow-500 hover:bg-yellow-400 text-black rounded-full font-black text-lg hover:scale-105 transition-transform shadow-[0_0_20px_rgba(234,179,8,0.4)] relative z-10">
                      重新開始體驗
                    </button>
                  </div>
                )}

                {scene === "gameover" && (
                  <div className="animate-in fade-in duration-500 bg-red-950 border-2 border-red-500/50 rounded-[2rem] p-12 md:p-20 text-center shadow-[0_0_50px_rgba(239,68,68,0.3)] mt-10">
                    <div className="text-8xl mb-8 animate-pulse">⚠️</div>
                    <h2 className="text-5xl md:text-6xl font-black text-red-500 mb-6">時間耗盡</h2>
                    <p className="text-2xl text-red-200 mb-10">系統已被完全鎖定，你未能找出學習歷程的核心。</p>
                    <button onClick={() => window.location.reload()} className="px-10 py-4 bg-red-600 hover:bg-red-500 text-white font-black rounded-xl transition-all shadow-xl">
                      重新啟動任務
                    </button>
                  </div>
                )}

                {toastMsg && (
                  <div className="fixed bottom-10 left-1/2 transform -translate-x-1/2 w-[90%] md:w-auto bg-red-600/95 text-white px-6 py-4 rounded-2xl shadow-[0_0_20px_rgba(220,38,38,0.4)] z-[250] animate-in slide-in-from-bottom-5 border border-red-400 font-bold max-w-sm md:max-w-md text-center">
                    ⚠️ {toastMsg}
                  </div>
                )}

              </div>
            </div>
          )}
        </React.Fragment>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
