<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>AI 學習歷程密室</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel for parsing JSX in the browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Custom Animations Fallback -->
  <style>
    .animate-in { animation-duration: 0.8s; animation-fill-mode: both; }
    .fade-in { animation-name: fadeIn; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .zoom-in { animation-name: zoomIn; }
    .zoom-in-95 { animation-name: zoomIn95; }
    @keyframes zoomIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    @keyframes zoomIn95 { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .slide-in-from-top-4 { animation-name: slideInTop; }
    @keyframes slideInTop { from { transform: translateY(-1rem); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .slide-in-from-bottom-4 { animation-name: slideInBottom; }
    .slide-in-from-bottom-5 { animation-name: slideInBottom5; }
    @keyframes slideInBottom { from { transform: translateY(1rem); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes slideInBottom5 { from { transform: translateY(1.25rem); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    
    /* 動畫時間與延遲設定 (用於感性過場畫面) */
    .duration-200 { animation-duration: 0.2s; }
    .duration-300 { animation-duration: 0.3s; }
    .duration-500 { animation-duration: 0.5s; }
    .duration-700 { animation-duration: 0.7s; }
    .duration-1000 { animation-duration: 1s; }
    .duration-2000 { animation-duration: 2s; }
    .delay-1000 { animation-delay: 1s; }
    .delay-2500 { animation-delay: 2.5s; }
    .delay-4000 { animation-delay: 4s; }
    .delay-6000 { animation-delay: 6s; }
    .delay-7500 { animation-delay: 7.5s; }
  </style>
</head>
<body class="bg-slate-950 text-white m-0 p-0 overflow-x-hidden">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- 場景靜態圖片網址設定區 (移至全域，防止重新渲染閃爍) ---
    const staticRoomImages = {
      cover: "assets/cover.png",
      main: "assets/main-hall.png",
      archive: "assets/archive.png",
      locker: "assets/locker.png",
      system: "assets/system-room.png",
      desk: "assets/desk.png",
      machineRoom: "assets/machine-room.png",
      prepRoom: "assets/prep-room.avif",
      puzzleBoard: "assets/system-room.png", 
      finalBoss: "assets/final-boss.png"
    };

    // --- 共用的場景靜態圖片渲染元件 ---
    const RoomImageDisplay = ({ roomId }) => {
      const imgUrl = staticRoomImages[roomId];
      if (!imgUrl) return null;

      return (
        <div className="mb-8 bg-black/40 border border-white/10 rounded-2xl p-5 shadow-lg">
          <div className="flex items-center gap-2 text-cyan-300 font-bold mb-4">
            <span className="text-xl">📸</span> 
            <h3>現場畫面紀錄</h3>
          </div>
          <div className="animate-in slide-in-from-top-4">
            <img src={imgUrl} className="w-full rounded-xl shadow-2xl max-h-[400px] object-cover border border-white/20" alt="Room Scene" />
          </div>
        </div>
      );
    };

    function App() {
      // --- 遊戲全域狀態 ---
      const [scene, setScene] = useState("cover"); 
      const sceneRef = useRef(scene);
      const [timeLeft, setTimeLeft] = useState(1200); 
      const [inventory, setInventory] = useState([]); 
      const [inspectingItem, setInspectingItem] = useState(null); 
      const [showHintModal, setShowHintModal] = useState(false); 
      const [playerName, setPlayerName] = useState(""); 
      const [quoteIndex, setQuoteIndex] = useState(0); 
      const [certificateImage, setCertificateImage] = useState("");
      const [feedbackText, setFeedbackText] = useState("");
      const [feedbackEntries, setFeedbackEntries] = useState([]);
      
      // 同步 scene 到 useRef
      useEffect(() => {
        sceneRef.current = scene;
      }, [scene]);

      useEffect(() => {
        try {
          const savedEntries = JSON.parse(localStorage.getItem("aiPortfolioFeedbackEntries") || "[]");
          if (Array.isArray(savedEntries)) setFeedbackEntries(savedEntries);
        } catch (e) {}
      }, []);

      // --- 100 分總分系統與提示解鎖狀態 ---
      const [score, setScore] = useState(100);
      const [unlockedHints, setUnlockedHints] = useState({});

      // --- 音效系統 (Web Audio API 配樂與滴答聲) ---
      const audioCtxRef = useRef(null);
      const musicStateRef = useRef({ intervalId: null, step: 0, master: null, drones: [] });
      const isMutedRef = useRef(false);
      const [isMuted, setIsMuted] = useState(false);

      useEffect(() => {
        isMutedRef.current = isMuted;
      }, [isMuted]);

      const initAudio = () => {
        if (!audioCtxRef.current) {
          audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtxRef.current.state === 'suspended') {
          audioCtxRef.current.resume();
        }
      };

      const stopSpyMusic = () => {
        const state = musicStateRef.current;
        if (state.intervalId) {
          clearInterval(state.intervalId);
          state.intervalId = null;
        }
        state.drones.forEach(({ osc, gain }) => {
          try {
            const ctx = audioCtxRef.current;
            gain.gain.cancelScheduledValues(ctx.currentTime);
            gain.gain.setTargetAtTime(0, ctx.currentTime, 0.12);
            osc.stop(ctx.currentTime + 0.35);
          } catch (e) {}
        });
        state.drones = [];
        if (state.master) {
          try {
            const ctx = audioCtxRef.current;
            const masterToDisconnect = state.master;
            masterToDisconnect.gain.cancelScheduledValues(ctx.currentTime);
            masterToDisconnect.gain.setTargetAtTime(0, ctx.currentTime, 0.08);
            setTimeout(() => {
              try { masterToDisconnect.disconnect(); } catch (e) {}
            }, 250);
          } catch (e) {}
          state.master = null;
        }
      };

      const startSpyMusic = () => {
        if (!audioCtxRef.current || isMutedRef.current || musicStateRef.current.intervalId) return;

        try {
          const ctx = audioCtxRef.current;
          const master = ctx.createGain();
          const lowpass = ctx.createBiquadFilter();
          const compressor = ctx.createDynamicsCompressor();
          const delay = ctx.createDelay();
          const delayGain = ctx.createGain();

          master.gain.setValueAtTime(0.0001, ctx.currentTime);
          master.gain.exponentialRampToValueAtTime(0.16, ctx.currentTime + 0.8);

          lowpass.type = "lowpass";
          lowpass.frequency.setValueAtTime(2400, ctx.currentTime);
          lowpass.Q.setValueAtTime(0.75, ctx.currentTime);

          compressor.threshold.setValueAtTime(-24, ctx.currentTime);
          compressor.knee.setValueAtTime(18, ctx.currentTime);
          compressor.ratio.setValueAtTime(4, ctx.currentTime);
          compressor.attack.setValueAtTime(0.02, ctx.currentTime);
          compressor.release.setValueAtTime(0.25, ctx.currentTime);

          delay.delayTime.setValueAtTime(0.22, ctx.currentTime);
          delayGain.gain.setValueAtTime(0.12, ctx.currentTime);

          master.connect(lowpass);
          lowpass.connect(compressor);
          compressor.connect(ctx.destination);
          compressor.connect(delay);
          delay.connect(delayGain);
          delayGain.connect(ctx.destination);

          musicStateRef.current.master = master;

          const createDrone = (frequency, gainLevel, type = "sine") => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(frequency, ctx.currentTime);
            gain.gain.setValueAtTime(0.0001, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(gainLevel, ctx.currentTime + 1.5);
            osc.connect(gain);
            gain.connect(master);
            osc.start();
            musicStateRef.current.drones.push({ osc, gain });
          };

          createDrone(55, 0.08);
          createDrone(82.41, 0.035, "triangle");

          const bassPattern = [110, 110, 130.81, 123.47, 110, 98, 103.83, 92.5];
          const leadPattern = {
            1: 440,
            3: 392,
            6: 415.3,
            9: 349.23,
            11: 329.63,
            14: 311.13
          };
          const padChords = [
            [220, 261.63, 329.63],
            [196, 246.94, 293.66],
            [207.65, 246.94, 311.13],
            [185, 233.08, 277.18]
          ];

          const playTone = (frequency, startTime, duration, type, peak, destination = master) => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(frequency, startTime);
            gain.gain.setValueAtTime(0.0001, startTime);
            gain.gain.exponentialRampToValueAtTime(peak, startTime + 0.025);
            gain.gain.setTargetAtTime(0.0001, startTime + duration * 0.55, duration * 0.22);
            osc.connect(gain);
            gain.connect(destination);
            osc.start(startTime);
            osc.stop(startTime + duration + 0.12);
          };

          const playMusicStep = () => {
            if (isMutedRef.current) {
              stopSpyMusic();
              return;
            }

            const state = musicStateRef.current;
            const step = state.step % 16;
            const now = ctx.currentTime + 0.04;

            if (step % 2 === 0) {
              const bass = bassPattern[Math.floor(step / 2) % bassPattern.length];
              playTone(bass, now, 0.34, "sine", 0.32);
              playTone(bass * 2, now + 0.01, 0.18, "triangle", 0.06);
            }

            if (leadPattern[step]) {
              playTone(leadPattern[step], now + 0.03, 0.42, "triangle", 0.13);
            }

            if (step === 0 || step === 8) {
              const chord = padChords[(state.step / 8) % padChords.length];
              chord.forEach((note, index) => {
                playTone(note, now + index * 0.015, 1.65, "sine", 0.04);
              });
            }

            state.step += 1;
          };

          playMusicStep();
          musicStateRef.current.intervalId = setInterval(playMusicStep, 250);
        } catch (e) {}
      };

      const playTick = (isFast) => {
        if (!audioCtxRef.current || isMutedRef.current) return;
        try {
          const ctx = audioCtxRef.current;
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();

          osc.connect(gain);
          gain.connect(ctx.destination);

          osc.type = 'square';
          osc.frequency.setValueAtTime(isFast ? 800 : 400, ctx.currentTime);

          gain.gain.setValueAtTime(0, ctx.currentTime);
          gain.gain.linearRampToValueAtTime(0.025, ctx.currentTime + 0.01);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);

          osc.start(ctx.currentTime);
          osc.stop(ctx.currentTime + 0.1);
        } catch (e) {}
      };

      const handleStartGame = () => {
        if (playerName.trim()) {
          initAudio();
          startSpyMusic();
          setScene("main");
        } else {
          showToast("請輸入特務代號！");
        }
      };

      const toggleMute = () => {
        setIsMuted(!isMuted);
      };

      useEffect(() => {
        const silentScenes = ["cover", "start", "epilogue", "clear", "gameover"];
        const shouldPlayMusic = !silentScenes.includes(scene) && !isMuted;

        if (shouldPlayMusic) {
          initAudio();
          startSpyMusic();
        } else {
          stopSpyMusic();
        }
      }, [scene, isMuted]);

      useEffect(() => {
        return () => stopSpyMusic();
      }, []);

      // 道具詳細資料 
      const itemDetails = {
        pin: {
          id: "pin",
          icon: "📝",
          name: "交叉比對報告",
          desc: "紀錄著 AI 退件邏輯的分析報告，上面解開的密碼為 7319。",
          clue: "🔍 仔細看，報告背後有一個用螢光筆寫的字根：【 十 】"
        },
        filter: {
          id: "filter",
          icon: "🟥",
          name: "紅色濾色片",
          desc: "半透明的紅色塑膠板，可以過濾掉紅色的光線。",
          clue: "普通的濾色片，似乎可以用在某個充滿紅色雜訊的場景。"
        },
        disk: {
          id: "disk",
          icon: "💽",
          name: "未解碼磁片",
          desc: "從學生置物櫃取得的磁片，資料區被機房防護程式鎖住。",
          clue: "磁片正面貼著標籤：請插入機房主控電腦，完成地雷座標驗證。"
        },
        evidence: {
          id: "evidence",
          icon: "💽",
          name: "磁片：【證據】",
          desc: "已從機房安全取回的證據磁片，裡面保存著學生真實經歷的佐證資料。",
          clue: "🔍 翻至磁片背面，顯示一個字根：【 具 】"
        },
        growth: {
          id: "growth",
          icon: "🌱",
          name: "核心代碼：【成長】",
          desc: "修復 AI 演算法後取得的核心概念代碼。",
          clue: "🔍 代碼的最後一行，閃爍著一個字根：【宀  】"
        },
        reflection: {
          id: "reflection",
          icon: "🔏",
          name: "教授印章：【反思】",
          desc: "教授用來核可優秀學習歷程的專用印章。",
          clue: "🔍 印章木柄的底部，刻著一個字根：【 毋 】"
        },
        motivation: {
          id: "motivation",
          icon: "🧭",
          name: "導航羅盤：【動機】",
          desc: "指引出行動背後最純粹的熱情與初衷。",
          clue: "🔍 羅盤的背面，刻著一個字根：【 貝 】"
        }
      };

      // --- 各房間獨立狀態 ---
      const [archiveMatches, setArchiveMatches] = useState({ A: "", B: "", C: "", D: "" });
      const [archiveSolved, setArchiveSolved] = useState(false);
      
      const initialSudoku = [[1, 0, 0], [0, 2, 1], [2, 0, 3]];
      const targetSudoku = [[1, 3, 2], [3, 2, 1], [2, 1, 3]];
      const [sudokuGrid, setSudokuGrid] = useState(initialSudoku);
      const [lockerUnlocked, setLockerUnlocked] = useState(false);
      
      const [systemPin, setSystemPin] = useState("");
      const [systemUnlocked, setSystemUnlocked] = useState(false);
      const [systemDecoded, setSystemDecoded] = useState(false);
      const [systemCrypto, setSystemCrypto] = useState("");
      
      const [filterActive, setFilterActive] = useState(false);
      const [deskSolved, setDeskSolved] = useState(false);
      const [deskAnswer, setDeskAnswer] = useState("");

      const mineGridSize = 5;
      const minePositions = [0, 4, 10, 14, 18, 20, 22, 24];
      const evidenceLetters = ["E", "V", "I", "D", "E", "N", "C", "E"];
      const [markedMines, setMarkedMines] = useState([]);
      const [revealedCells, setRevealedCells] = useState([]);
      const [explodedMine, setExplodedMine] = useState(null);
      const [flagMode, setFlagMode] = useState(false);
      const [diskInserted, setDiskInserted] = useState(false);
      const [minePuzzleSolved, setMinePuzzleSolved] = useState(false);
      const [machineAnswer, setMachineAnswer] = useState("");
      const [machineSolved, setMachineSolved] = useState(false);

      const initialPuzzle = [4, 1, 8, 2, 7, 0, 5, 3, 6];
      const [puzzlePieces, setPuzzlePieces] = useState(initialPuzzle);
      const [selectedPuzzleIdx, setSelectedPuzzleIdx] = useState(null);
      const isPuzzleSolved = puzzlePieces.every((val, i) => val === i);
      const [prepCode, setPrepCode] = useState("");
      const [prepSolved, setPrepSolved] = useState(false);
      const puzzleLabels = ["不", "盲", "目", "跟", "從", "找", "回", "熱", "忱"];

      const [finalSlots, setFinalSlots] = useState({ s1: "", s2: "", s3: "", s4: "" });
      const [finalRiddleAnswer, setFinalRiddleAnswer] = useState("");

      const [toastMsg, setToastMsg] = useState("");
      useEffect(() => {
        if (toastMsg) {
          const timer = setTimeout(() => setToastMsg(""), 3500);
          return () => clearTimeout(timer);
        }
      }, [toastMsg]);
      const showToast = (msg) => setToastMsg(msg);

      const quotes = [
        "「學習不是為了向誰證明，而是為了看見自己成長的軌跡。」",
        "「每一次反思，都是為了下一次躍進積蓄能量。」",
        "「真實的經歷不需要華麗的包裝，證據會為你說話。」",
        "「成長的價值，隱藏在從『不會』到『會』的汗水裡。」",
        "「最好的學習歷程，就是你真誠面對自己改變的故事。」"
      ];

      // --- 倒數計時器 (獨立執行) ---
      useEffect(() => {
        const timer = setInterval(() => {
          const currentScene = sceneRef.current;
          if (currentScene === "cover" || currentScene === "start" || currentScene === "epilogue" || currentScene === "clear" || currentScene === "gameover") return;
          
          setTimeLeft((prev) => {
            if (prev <= 1) {
              setScene("gameover");
              return 0;
            }
            return prev - 1;
          });
        }, 1000);
        return () => clearInterval(timer);
      }, []);

      // --- 根據 timeLeft 播放滴答聲 ---
      useEffect(() => {
        const currentScene = sceneRef.current;
        if (currentScene === "cover" || currentScene === "start" || currentScene === "epilogue" || currentScene === "clear" || currentScene === "gameover") return;
        if (timeLeft <= 0) return;

        const isFast = timeLeft <= 300; 
        playTick(isFast);
        
        let timeoutId;
        if (isFast) {
          timeoutId = setTimeout(() => {
            const latestScene = sceneRef.current;
            if (latestScene !== "clear" && latestScene !== "gameover" && latestScene !== "epilogue") {
              playTick(isFast);
            }
          }, 500);
        }
        return () => clearTimeout(timeoutId);
      }, [timeLeft]);

      const addToInventory = (itemId) => {
        setInventory((prev) => {
          if (!prev.includes(itemId)) return [...prev, itemId];
          return prev;
        });
      };

      // --- 提示與解答資料庫 ---
      const hintData = {
        main: {
          hint: "大廳有 6 個區域可以搜查。解開所有謎題取得 4 個核心模組與密碼報告後，才能解鎖下方的終極防火牆喔！",
          solution: "分別完成檔案櫃、置物櫃、審查系統、辦公桌、機房、面試室。防火牆解答依序為：【動機】、【證據】、【成長】、【反思】。"
        },
        archive: {
          hint: "仔細對照左側的退件守則！檔案A只有獎狀；檔案B沒附截圖；檔案C心得太表面；檔案D文不對題。",
          solution: "由上而下選擇代碼：7、3、1、9，再點擊提交。"
        },
        locker: {
          hint: "這是一個數獨謎題，每一行、每一列數字 1、2、3 都只能出現一次且不能重複。",
          solution: "第一排: 1、3、2；第二排: 3、2、1；第三排: 2、1、3。解開後可取得紅色濾色片與未解碼磁片。"
        },
        system: {
          hint: "PIN 碼在「退件檔案櫃」拿到的交叉比對報告背後。圖形解碼是植物從小到大的改變過程。",
          solution: "密碼輸入 7319；解譯文字輸入「成長」。"
        },
        desk: {
          hint: "需要能過濾紅光的道具，先去「學生置物櫃」解開數獨找找看！",
          solution: "在置物櫃拿到「紅色濾色片」後，點擊裝備，讀出備忘錄中留下的關鍵字，並輸入兩個中文字完成驗證。"
        },
        machineRoom: {
          hint: "先取得學生置物櫃裡的未解碼磁片，再進入機房。左鍵開安全格，右鍵或插旗模式標記可疑地雷。",
          solution: "避開所有地雷並打開安全格後，地雷位置會顯示 EVIDENCE；輸入 EVIDENCE 或 evidence 都可取回證據磁片。"
        },
        prepRoom: {
          hint: "點擊相鄰碎片交換位置，拼成一張完整的電路板背景，並讀出上面的句子。",
          solution: "拼出完整的圖後，觀察浮現的衣服、刀子與愛心符號；下方文字框請輸入「初心」。"
        },
        finalBoss: {
          hint: "打開下方道具欄，檢視每一個道具。把它們上面隱藏的字根：【十】【具】【宀】【毋】【貝】組合起來。",
          solution: "組合後的答案為「真實」。"
        }
      };

      const handleUnlockFeature = (type, cost) => {
        if (score >= cost) {
          setScore(s => s - cost);
          setUnlockedHints(prev => ({
            ...prev,
            [scene]: { ...(prev[scene] || {}), [type]: true }
          }));
          showToast(`已扣除 ${cost} 分，成功開啟${type === 'hint' ? '提示' : '解答'}！`);
        } else {
          showToast("⚠️ 特務積分不足，無法開啟此功能！");
        }
      };

      const renderMachineRoom = () => {
        const hasDisk = inventory.includes("disk");
        const mineSet = new Set(minePositions);
        const mineDetonated = explodedMine !== null;
        const getAdjacentMineCount = (idx) => {
          const row = Math.floor(idx / mineGridSize);
          const col = idx % mineGridSize;
          let count = 0;
          for (let dr = -1; dr <= 1; dr++) {
            for (let dc = -1; dc <= 1; dc++) {
              if (dr === 0 && dc === 0) continue;
              const nr = row + dr;
              const nc = col + dc;
              if (nr >= 0 && nr < mineGridSize && nc >= 0 && nc < mineGridSize && mineSet.has(nr * mineGridSize + nc)) count++;
            }
          }
          return count;
        };
        const completeMinePuzzleIfReady = (nextRevealed, nextMarked) => {
          const allSafeRevealed = Array.from({ length: mineGridSize * mineGridSize }).every((_, idx) => mineSet.has(idx) || nextRevealed.includes(idx));
          const flagsMatchMines = nextMarked.length === minePositions.length && minePositions.every(idx => nextMarked.includes(idx));
          if (allSafeRevealed || flagsMatchMines) {
            setMinePuzzleSolved(true);
            setMarkedMines([...minePositions]);
            showToast("防護網解除，磁片資料開始解碼。");
          }
        };
        const resetMinePuzzle = () => {
          setMarkedMines([]);
          setRevealedCells([]);
          setExplodedMine(null);
          setMachineAnswer("");
          setMinePuzzleSolved(false);
        };
        const toggleMineMark = (idx) => {
          if (!hasDisk || mineDetonated || minePuzzleSolved || machineSolved || revealedCells.includes(idx)) return;
          setMarkedMines(prev => {
            const nextMarked = prev.includes(idx) ? prev.filter(item => item !== idx) : [...prev, idx];
            completeMinePuzzleIfReady(revealedCells, nextMarked);
            return nextMarked;
          });
        };
        const getNeighborIndexes = (idx) => {
          const row = Math.floor(idx / mineGridSize);
          const col = idx % mineGridSize;
          const neighbors = [];
          for (let dr = -1; dr <= 1; dr++) {
            for (let dc = -1; dc <= 1; dc++) {
              if (dr === 0 && dc === 0) continue;
              const nr = row + dr;
              const nc = col + dc;
              if (nr >= 0 && nr < mineGridSize && nc >= 0 && nc < mineGridSize) neighbors.push(nr * mineGridSize + nc);
            }
          }
          return neighbors;
        };
        const revealCell = (idx) => {
          if (!hasDisk || mineDetonated || minePuzzleSolved || machineSolved || markedMines.includes(idx) || revealedCells.includes(idx)) return;
          if (mineSet.has(idx)) {
            setExplodedMine(idx);
            setRevealedCells(prev => prev.includes(idx) ? prev : [...prev, idx]);
            showToast("踩到地雷！請看 💣 標記，點擊重啟本局再挑戰。");
            return;
          }

          const nextRevealed = new Set(revealedCells);
          const queue = [idx];
          while (queue.length) {
            const current = queue.shift();
            if (nextRevealed.has(current) || mineSet.has(current) || markedMines.includes(current)) continue;
            nextRevealed.add(current);
            if (getAdjacentMineCount(current) === 0) {
              getNeighborIndexes(current).forEach(neighbor => {
                if (!nextRevealed.has(neighbor) && !mineSet.has(neighbor)) queue.push(neighbor);
              });
            }
          }

          const revealedList = [...nextRevealed];
          setRevealedCells(revealedList);
          completeMinePuzzleIfReady(revealedList, markedMines);
        };
        const handleMineCellClick = (idx) => {
          if (flagMode) toggleMineMark(idx);
          else revealCell(idx);
        };
        const completeMachineRoom = () => {
          const normalizedAnswer = machineAnswer.trim().toLowerCase();
          if (normalizedAnswer === "evidence") {
            setMachineSolved(true);
            setInventory(prev => {
              const withoutDisk = prev.filter(id => id !== "disk");
              return withoutDisk.includes("evidence") ? withoutDisk : [...withoutDisk, "evidence"];

                      >
                        <div className="text-7xl mb-4 group-hover:scale-110 transition-transform">💽</div>
                        <h3 className="text-2xl font-black text-cyan-300 mb-3">未解碼磁片</h3>
                        <p className="text-slate-300 leading-relaxed">
                          點擊磁片物件，插入主控電腦並啟動踩地雷解碼程序。
                        </p>
                      </button>
                    </div>
                  ) : (
                    <div className="grid lg:grid-cols-[minmax(0,1fr)_320px] gap-6 items-start">

                            const isMine = mineSet.has(idx);
                            const isMarked = markedMines.includes(idx);
                            const isRevealed = revealedCells.includes(idx);
                            const letterIndex = minePositions.indexOf(idx);
                            const clueCount = getAdjacentMineCount(idx);
                            return (
                              <button
                                key={idx}
                                onClick={() => handleMineCellClick(idx)}
                                onContextMenu={(e) => {
                                  e.preventDefault();
                                  toggleMineMark(idx);

                                disabled={mineDetonated || minePuzzleSolved || machineSolved}
                                className={`aspect-square rounded-lg border text-lg md:text-xl font-black transition-all flex items-center justify-center ${

                                        : 'bg-slate-900 text-cyan-200 border-slate-700 hover:border-cyan-400 hover:bg-slate-800'
                                }`}
                                title={`第 ${Math.floor(idx / mineGridSize) + 1} 列，第 ${(idx % mineGridSize) + 1} 行`}
                              >

                              </button>

                          })}
                        </div>
                      </div>

                      <div className="bg-slate-950/80 border border-cyan-800 rounded-2xl p-5">
                        <div className="flex items-center gap-3 mb-4">
                          <span className="text-3xl">💽</span>
                          <div>
                            <h3 className="text-cyan-300 font-bold">磁片已插入</h3>
                            <p className="text-xs text-slate-400">已插旗 {markedMines.length} / {minePositions.length}，已打開 {revealedCells.length} 格{mineDetonated ? '，已踩雷' : ''}</p>
                          </div>
                        </div>

                        {!minePuzzleSolved ? (
                          <React.Fragment>
                            <p className="text-slate-300 text-sm leading-relaxed mb-4">
                              左鍵打開格子，右鍵插旗；手機可先開啟插旗模式。點到空白安全格會自動展開相鄰安全區，踩到地雷會顯示 💣，請按重啟本局再挑戰。
                            </p>
                            <div className="grid grid-cols-2 gap-3">

                              <button
                                onClick={() => {

                                  showToast("機房踩地雷已重啟。");
                                }}
                                className="px-4 py-3 bg-slate-800 hover:bg-slate-700 text-slate-200 border border-slate-700 font-bold rounded-xl transition-all"
                              >
                                重啟本局

                            </div>

                          <div className="animate-in fade-in">
                            <p className="text-cyan-200 text-sm leading-relaxed mb-4">

                            </p>
                            <input
                              type="text"
                              value={machineAnswer}
                              onChange={(e) => setMachineAnswer(e.target.value)}

                              placeholder="輸入英文字母（大小寫不限）"

                            <button

                              取出證據磁片

                          </div>
                        )}
                      </div>
                    </div>

                      🔍 翻至磁片背面，顯示一個字根：【 具 】
                    </div>
                  </div>
                </div>

            <div className="mt-8 flex justify-center">
              <button onClick={() => setScene("main")} className="px-8 py-3 bg-slate-800 hover:bg-slate-700 border border-slate-600 text-cyan-400 font-bold rounded-full transition-all shadow-lg">

            setSelectedPuzzleIdx(idx);

            if (selectedPuzzleIdx === idx) {

            } else {
              const newPieces = [...puzzlePieces];
              [newPieces[selectedPuzzleIdx], newPieces[idx]] = [newPieces[idx], newPieces[selectedPuzzleIdx]];
              setPuzzlePieces(newPieces);
              setSelectedPuzzleIdx(null);

                    <span className="text-purple-300 font-bold">請點擊並交換碎片，重組這幅破碎的記憶，找出隱藏的關鍵詞。</span>
                  </p>

                  <div className="grid grid-cols-3 gap-1 w-64 h-64 md:w-80 md:h-80 mx-auto mb-8 bg-purple-900/30 p-2 rounded-xl border border-purple-500/50 relative overflow-visible shadow-[0_0_20px_rgba(147,51,234,0.3)]">

                            {puzzleLabels[pieceVal]}

                        </div>
                      </button>

                    {isPuzzleSolved && (
                      <div className="absolute inset-0 flex items-center justify-center animate-in fade-in z-20 pointer-events-none">

                        <div className="relative z-10 w-[min(96vw,560px)] border-2 border-yellow-400 px-8 py-6 rounded-xl bg-black/70 shadow-[0_0_22px_rgba(250,204,21,0.72)]">

          const gradient = ctx.createLinearGradient(0, 0, 1200, 800);
          gradient.addColorStop(0, "#061b2e");
          gradient.addColorStop(0.5, "#10233f");
          gradient.addColorStop(1, "#111827");
          ctx.fillStyle = gradient;
          ctx.fillRect(0, 0, 1200, 800);

          ctx.strokeStyle = "#facc15";
          ctx.lineWidth = 10;
          ctx.strokeRect(50, 50, 1100, 700);
          ctx.strokeStyle = "rgba(34,211,238,0.7)";
          ctx.lineWidth = 3;
          ctx.strokeRect(78, 78, 1044, 644);

          ctx.fillStyle = "#facc15";
          ctx.font = "bold 64px Microsoft JhengHei, sans-serif";
          ctx.textAlign = "center";
          ctx.fillText("AI 學習歷程密室 破關證書", 600, 180);

          ctx.fillStyle = "#e5e7eb";
          ctx.font = "32px Microsoft JhengHei, sans-serif";
          ctx.fillText("授予特務", 600, 270);

          ctx.fillStyle = "#67e8f9";
          ctx.font = "bold 56px Microsoft JhengHei, sans-serif";
          ctx.fillText(playerName || "匿名特務", 600, 345);

          ctx.font = "34px Microsoft JhengHei, sans-serif";

          ctx.font = "bold 36px Microsoft JhengHei, sans-serif";

          ctx.fillStyle = "#94a3b8";
          ctx.font = "24px Microsoft JhengHei, sans-serif";
          ctx.fillText(new Date().toLocaleDateString("zh-TW"), 600, 665);

          const dataUrl = canvas.toDataURL("image/png");
          setCertificateImage(dataUrl);
          const link = document.createElement("a");
          link.href = dataUrl;
          link.download = `AI學習歷程密室-破關證書-${playerName || "匿名特務"}.png`;

          return;

        if (file.size > 1600000) {
          showToast("圖片檔案太大，請先壓縮或截圖裁小一點。");
          return;

        const reader = new FileReader();
        reader.onload = () => setCertificateImage(reader.result);
        reader.readAsDataURL(file);
      };

                {showHintModal && (
                  <div 
                    className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm animate-in fade-in duration-200" 
                    onClick={() => setShowHintModal(false)}
                  >
                    <div 
                      className="bg-slate-900 border-2 border-yellow-500/50 rounded-2xl p-6 md:p-8 max-w-md w-full shadow-[0_0_40px_rgba(202,138,4,0.3)] relative" 
                      onClick={e => e.stopPropagation()}
                    >
                      <button
                        onClick={() => setShowHintModal(false)}
                        className="absolute top-4 right-4 text-slate-400 hover:text-white bg-slate-800 hover:bg-slate-700 rounded-full w-8 h-8 flex items-center justify-center transition-colors font-bold"
                      >
                        ✕
                      </button>
                      <div className="flex items-center gap-3 mb-4 border-b border-yellow-500/30 pb-4">
                        <span className="text-4xl">💡</span>
                        <h3 className="text-2xl font-black text-yellow-400">特務情報交易</h3>
                      </div>
                      
                      {renderHintModalContent()}

                      <div className="mt-6 flex justify-end">
                        <button 
                          onClick={() => setShowHintModal(false)}
                          className="px-6 py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold rounded-xl transition-all w-full md:w-auto"
                        >
                          關閉面板
                        </button>
                      </div>
                    </div>
                  </div>
                )}

                {scene === "clear" && (
                  <div className="animate-in zoom-in duration-700 bg-slate-900 border-4 border-yellow-500/80 rounded-[2rem] p-8 md:p-16 text-white text-center shadow-[0_0_60px_rgba(234,179,8,0.3)] mt-10 relative overflow-hidden">
                    <div className="absolute top-0 left-0 w-full h-full bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-yellow-900/20 via-slate-900/0 to-slate-900/0 pointer-events-none"></div>
                    <div className="text-8xl mb-6 drop-shadow-xl relative z-10">🏆</div>
                    <h2 className="text-4xl md:text-5xl font-black mb-2 text-yellow-400 tracking-widest relative z-10">破關證書</h2>
                    <div className="w-24 h-1 bg-yellow-500 mx-auto mb-6 relative z-10"></div>
                    
                    <p className="text-xl md:text-2xl text-slate-300 mb-2 relative z-10">
                      特務 <span className="text-cyan-400 font-bold border-b-2 border-cyan-400">{playerName}</span>
                    </p>
                    <p className="text-xl md:text-2xl text-yellow-300 font-bold mb-6 relative z-10 drop-shadow">
                      最終特務積分：{score} / 100
                    </p>

                    <p className="text-lg text-slate-400 mb-10 relative z-10">
                      成功於 <span className="text-white font-bold">{getClearTimeText()}</span> 內覆寫 AI 審查系統，<br/>找回了真實學習歷程的核心價值。
                    </p>

                    <div className="bg-black/50 border border-yellow-600/50 p-6 md:p-8 rounded-2xl mb-10 relative z-10 max-w-2xl mx-auto shadow-inner">
                      <p className="text-2xl font-bold text-yellow-200 leading-relaxed font-serif">
                        {quotes[quoteIndex]}
                      </p>
                    </div>

                    <div className="flex flex-col sm:flex-row justify-center gap-4 relative z-10 mb-10">
                      <button onClick={generateCertificateImage} className="px-8 py-4 bg-cyan-500 hover:bg-cyan-400 text-black rounded-full font-black text-lg hover:scale-105 transition-transform shadow-[0_0_20px_rgba(34,211,238,0.35)]">
                        下載破關證書
                      </button>
                      <button onClick={() => window.location.reload()} className="px-8 py-4 bg-yellow-500 hover:bg-yellow-400 text-black rounded-full font-black text-lg hover:scale-105 transition-transform shadow-[0_0_20px_rgba(234,179,8,0.4)]">
                        重新開始體驗
                      </button>
                    </div>

                    <div className="relative z-10 text-left bg-slate-950/85 border border-cyan-500/40 rounded-2xl p-5 md:p-7 max-w-4xl mx-auto">
                      <div className="flex flex-col md:flex-row md:items-end md:justify-between gap-3 mb-5">
                        <div>
                          <h3 className="text-2xl md:text-3xl font-black text-cyan-300 mb-2">破關心得留言板</h3>
                          <p className="text-sm text-slate-400">可上傳破關證書圖片並留下心得。此靜態版會保存在目前這台裝置的瀏覽器中。</p>
                        </div>
                        <label className="inline-flex items-center justify-center px-5 py-3 bg-slate-800 hover:bg-slate-700 border border-slate-600 text-cyan-200 rounded-xl font-bold cursor-pointer transition-all">
                          上傳證書圖片
                          <input type="file" accept="image/*" onChange={handleCertificateUpload} className="hidden" />
                        </label>
                      </div>

                      {certificateImage && (
                        <div className="mb-5">
                          <p className="text-xs text-cyan-300 font-bold mb-2">證書預覽</p>
                          <img src={certificateImage} alt="破關證書預覽" className="w-full max-h-72 object-contain bg-black/50 border border-cyan-900 rounded-xl" />
                        </div>
                      )}

                      <textarea
                        value={feedbackText}
                        onChange={(e) => setFeedbackText(e.target.value)}
                        placeholder="寫下你的破關心得、最喜歡的關卡，或給老師/作者的回饋..."
                        className="w-full min-h-32 bg-black/70 border border-cyan-800 text-cyan-50 px-5 py-4 rounded-xl outline-none focus:border-cyan-300 focus:ring-1 focus:ring-cyan-300 placeholder:text-slate-500 mb-4"
                      />
                      <button onClick={submitFeedback} className="w-full md:w-auto px-8 py-3 bg-cyan-500 hover:bg-cyan-400 text-black font-black rounded-xl transition-all">
                        送出心得
                      </button>

                      <div className="mt-8 border-t border-slate-700 pt-6">
                        <h4 className="text-xl font-black text-yellow-300 mb-4">玩家分享</h4>
                        {feedbackEntries.length === 0 ? (
                          <p className="text-slate-500 text-center py-8">目前還沒有留言，成為第一位分享破關心得的玩家。</p>
                        ) : (
                          <div className="grid md:grid-cols-2 gap-4">
                            {feedbackEntries.map(entry => (
                              <div key={entry.id} className="bg-slate-900/90 border border-slate-700 rounded-xl p-4">
                                <div className="flex items-start justify-between gap-3 mb-3">
                                  <div>
                                    <div className="text-cyan-300 font-black">{entry.name}</div>
                                    <div className="text-xs text-slate-500">{entry.date}</div>
                                  </div>
                                  <div className="text-right text-xs text-yellow-300 font-bold">
                                    {entry.score}/100<br/>{entry.clearTime}
                                  </div>
                                </div>
                                {entry.certificateImage && (
                                  <img src={entry.certificateImage} alt={`${entry.name} 的破關證書`} className="w-full max-h-48 object-contain bg-black/50 border border-slate-800 rounded-lg mb-3" />
                                )}
                                <p className="text-slate-200 leading-relaxed whitespace-pre-wrap">{entry.text}</p>
                              </div>
                            ))}
                          </div>
                        )}
                      </div>
                    </div>
                  </div>
                )}

                {scene === "gameover" && (
                  <div className="animate-in fade-in duration-500 bg-red-950 border-2 border-red-500/50 rounded-[2rem] p-12 md:p-20 text-center shadow-[0_0_50px_rgba(239,68,68,0.3)] mt-10">
                    <div className="text-8xl mb-8 animate-pulse">⚠️</div>
                    <h2 className="text-5xl md:text-6xl font-black text-red-500 mb-6">時間耗盡</h2>
                    <p className="text-2xl text-red-200 mb-10">系統已被完全鎖定，你未能找出學習歷程的核心。</p>
                    <button onClick={() => window.location.reload()} className="px-10 py-4 bg-red-600 hover:bg-red-500 text-white font-black rounded-xl transition-all shadow-xl">
                      重新啟動任務
                    </button>
                  </div>
                )}

                {toastMsg && (
                  <div className="fixed bottom-10 left-1/2 transform -translate-x-1/2 w-[90%] md:w-auto bg-red-600/95 text-white px-6 py-4 rounded-2xl shadow-[0_0_20px_rgba(220,38,38,0.4)] z-[250] animate-in slide-in-from-bottom-5 border border-red-400 font-bold max-w-sm md:max-w-md text-center">
                    ⚠️ {toastMsg}
                  </div>
                )}

              </div>
            </div>
          )}
        </React.Fragment>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
